<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algo Trading Chart</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #0f1115;
            color: #e6e6e6;
            font-family: Arial, sans-serif;
        }

        #topbar {
            padding: 12px 16px;
            border-bottom: 1px solid #222;
            background: #151922;
            font-size: 14px;
        }

        #chart {
            width: 100%;
            height: calc(100vh - 49px);
        }
    </style>
</head>
<body>
    <div id="topbar">
        Graphique stratégie
    </div>

    <div id="chart"></div>

    <script>
        const candleData = {{donnees_javascript}};
        const strategyData = {{strategy_javascript}};

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: {
                background: { color: '#0f1115' },
                textColor: '#d9d9d9',
            },
            grid: {
                vertLines: { visible: false },
                horzLines: { visible: false },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderVisible: false,
            },
            timeScale: {
                borderVisible: false,
                timeVisible: true,
                secondsVisible: false,
            },
            width: window.innerWidth,
            height: window.innerHeight - 49,
        });

        const series = chart.addCandlestickSeries({
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderUpColor: '#26a69a',
            borderDownColor: '#ef5350',
            wickUpColor: '#26a69a',
            wickDownColor: '#ef5350',
        });

        series.setData(candleData);

        const markers = [];

        if (strategyData && strategyData.length > 0) {
            strategyData.forEach(trade => {
                if (trade.time !== undefined && trade.time !== null) {
                    markers.push({
                        time: Number(trade.time),
                        position: trade.type === 'short' ? 'aboveBar' : 'belowBar',
                        color: trade.type === 'short' ? '#ff6b6b' : '#51cf66',
                        shape: trade.type === 'short' ? 'arrowDown' : 'arrowUp',
                        text: trade.type === 'short' ? 'SELL' : 'BUY'
                    });
                }

                if (trade.exit_time !== undefined && trade.exit_time !== null) {
                    markers.push({
                        time: Number(trade.exit_time),
                        position: trade.type === 'short' ? 'belowBar' : 'aboveBar',
                        color: '#74c0fc',
                        shape: 'square',
                        text: trade.exit_reason || 'EXIT'
                    });
                }
            });
        }

        markers.sort((a, b) => a.time - b.time);
        series.setMarkers(markers);

        chart.timeScale().fitContent();

        window.addEventListener('resize', () => {
            chart.applyOptions({
                width: window.innerWidth,
                height: window.innerHeight - 49,
            });
        });
    </script>
</body>
</html>
