<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading System - Indicateurs</title>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #131722; font-family: sans-serif; overflow: hidden; }
        #chart { width: 100vw; height: 100vh; position: absolute; inset: 0; }
        #controls { position: absolute; top: 15px; right: 15px; z-index: 20; display: flex; gap: 10px; flex-wrap: wrap; }
        .tv-button { background-color: #2962FF; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; opacity: 0.9; font-size: 13px; }
        .tv-button:hover { opacity: 1; }
        #log { position: fixed; top: 15px; left: 15px; z-index: 9999; color: white; background: rgba(0,0,0,0.7); padding: 8px 10px; font: 12px Arial, sans-serif; border-radius: 6px; }
        #trend-dashboard { position: absolute; bottom: 25px; right: 20px; z-index: 20; background: rgba(19,23,34,0.85); border: 1px solid #2B2B43; border-radius: 6px; padding: 12px 16px; color: white; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none; min-width: 160px; }
        .trend-title { font-size: 11px; color: #d1d4dc; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .trend-value { font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <div id="log">Chargement...</div>
    <div id="controls">
        <button id="toggle-sessions" class="tv-button">Masquer les Sessions</button>
        <button id="toggle-ob" class="tv-button">Masquer les OB</button>
    </div>
    <div id="trend-dashboard">
        <div class="trend-title">Tendance Macro (<span id="trend-lookback">?</span> j)</div>
        <div id="trend-text" class="trend-value">En attente...</div>
    </div>

    <script>
        const candlesData = {{donnees_javascript}};
        const sessionsData = {{sessions_javascript}};
        const obData = {{ob_javascript}};
        const trendData = {{trend_javascript}};
        const strategyData = {{strategy_javascript}};

        class ZoneBackgroundPaneView {
            constructor() { this._zones = []; this._chart = null; this._series = null; }
            update(zones, chart, series) { this._zones = zones; this._chart = chart; this._series = series; }
            renderer() {
                return {
                    draw: (target) => {
                        if (!this._chart || !this._series) return;
                        target.useMediaCoordinateSpace((scope) => {
                            const ctx = scope.context;
                            const timeScale = this._chart.timeScale();
                            this._zones.forEach(zone => {
                                try {
                                    if (zone.max_p == null || zone.min_p == null) return;
                                    const startX = timeScale.timeToCoordinate(zone.start);
                                    const endX = timeScale.timeToCoordinate(zone.end);
                                    const topY = this._series.priceToCoordinate(zone.max_p);
                                    const bottomY = this._series.priceToCoordinate(zone.min_p);
                                    if (startX === null || endX === null || topY === null || bottomY === null) return;
                                    const left = Math.min(startX, endX);
                                    const width = Math.max(Math.abs(endX - startX), 1);
                                    const y = Math.min(topY, bottomY);
                                    const height = Math.abs(bottomY - topY);
                                    ctx.fillStyle = zone.color_bg;
                                    ctx.fillRect(left - 5, y - 5, width + 10, height + 10);
                                    ctx.strokeStyle = zone.color_border;
                                    ctx.lineWidth = 1;
                                    if (zone.border_style === 'dashed') ctx.setLineDash([4, 4]);
                                    else ctx.setLineDash([]);
                                    ctx.strokeRect(left - 5, y - 5, width + 10, height + 10);
                                    ctx.setLineDash([]);
                                } catch (e) {}
                            });
                        });
                    }
                };
            }
            zOrder() { return 'bottom'; }
        }

        class ZoneBackgroundPrimitive {
            constructor() { this._paneView = new ZoneBackgroundPaneView(); this._zones = []; }
            updateAllViews() { this._paneView.update(this._zones, this._chart, this._series); if (this.requestUpdate) this.requestUpdate(); }
            paneViews() { return [this._paneView]; }
            priceAxisViews() { return []; }
            timeAxisViews() { return []; }
            setZones(zones) { this._zones = zones; this.updateAllViews(); }
            attached(param) { this.requestUpdate = param.requestUpdate; this._chart = param.chart; this._series = param.series; this.updateAllViews(); }
            detached() { this.requestUpdate = undefined; this._chart = null; this._series = null; }
        }

        try {
            const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                autoSize: true,
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { visible: false }, horzLines: { visible: false } },
                timeScale: { timeVisible: true, secondsVisible: false },
                localization: { locale: 'fr-FR' },
                rightPriceScale: { autoScale: true },
            });

            const series = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350',
                borderUpColor: '#26a69a', borderDownColor: '#ef5350',
                wickUpColor: '#26a69a', wickDownColor: '#ef5350',
                priceFormat: { type: 'price', precision: 5, minMove: 0.00001 }
            });

            series.setData(candlesData);

            // Sessions
            const sessionPrimitive = new ZoneBackgroundPrimitive();
            if (sessionsData && sessionsData.length > 0) {
                sessionPrimitive.setZones(sessionsData);
                series.attachPrimitive(sessionPrimitive);
            }

            // Order Blocks
            const obPrimitive = new ZoneBackgroundPrimitive();
            if (obData && obData.length > 0) {
                obPrimitive.setZones(obData);
                series.attachPrimitive(obPrimitive);
            }

            console.log('strategyData', strategyData);
            // Stratégie Asian HTF Reversal - Markers
            if (strategyData && strategyData.length > 0) {
                const markers = [];

                strategyData.forEach(trade => {
                    if (!trade) return;

                    if (trade.time !== undefined && trade.time !== null) {
                        markers.push({
                            time: Number(trade.time),
                            position: trade.type === 'short' ? 'aboveBar' : 'belowBar',
                            color: trade.type === 'short' ? '#ff6b6b' : '#51cf66',
                            shape: trade.type === 'short' ? 'arrowDown' : 'arrowUp',
                            text: trade.type === 'short' ? 'SHORT' : 'LONG'
                        });
                    }

                    if (trade.exit_time !== undefined && trade.exit_time !== null) {
                        markers.push({
                            time: Number(trade.exit_time),
                            position: trade.type === 'short' ? 'belowBar' : 'aboveBar',
                            color:
                                trade.exit_reason === 'TP' ? '#4dabf7' :
                                trade.exit_reason === 'SL' ? '#ffd43b' :
                                trade.exit_reason === '23:00' ? '#ced4da' :
                                '#868e96',
                            shape: 'square',
                            text: trade.exit_reason || 'EXIT'
                        });
                    }
                });

                markers.sort((a, b) => a.time - b.time);

                if (markers.length > 0) {
                    series.setMarkers(markers);
                }
            }

            // Boutons toggle
            let sessionsVisible = true;
            document.getElementById('toggle-sessions').addEventListener('click', (e) => {
                if (sessionsVisible) { series.detachPrimitive(sessionPrimitive); e.target.innerText = "Afficher les Sessions"; }
                else { series.attachPrimitive(sessionPrimitive); e.target.innerText = "Masquer les Sessions"; }
                sessionsVisible = !sessionsVisible;
            });

            let obVisible = true;
            document.getElementById('toggle-ob').addEventListener('click', (e) => {
                if (obVisible) { series.detachPrimitive(obPrimitive); e.target.innerText = "Afficher les OB"; }
                else { series.attachPrimitive(obPrimitive); e.target.innerText = "Masquer les OB"; }
                obVisible = !obVisible;
            });

            // Dashboard tendance
            if (trendData && trendData.text) {
                const dashboard = document.getElementById('trend-dashboard');
                dashboard.style.display = 'block';
                const lookbackEl = document.getElementById('trend-lookback');
                if (lookbackEl) lookbackEl.innerText = trendData.lookback;
                const trendTextEl = document.getElementById('trend-text');
                if (trendTextEl) { trendTextEl.innerText = trendData.text; trendTextEl.style.color = trendData.color; }
            }

            chart.timeScale().fitContent();

            const log = document.getElementById('log');
            if (log) {
                log.textContent = 'OK - ' + candlesData.length + ' bougies chargées';
                setTimeout(() => { log.style.display = 'none'; }, 3000);
            }

        } catch (e) {
            console.error("Erreur de rendu:", e);
            const log = document.getElementById('log');
            if (log) log.textContent = 'Erreur Javascript: ' + e.message;
        }
    </script>
</body>
</html>
