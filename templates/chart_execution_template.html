<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphique stratégie</title>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #131722;
            overflow: hidden;
            font-family: sans-serif;
        }

        #chart {
            width: 100vw;
            height: 100vh;
        }

        #log {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 10px;
            font: 12px Arial, sans-serif;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <div id="log">Chargement...</div>

    <script>
        try {
            const candlesData = {{donnees_javascript}};
            const strategyData = {{strategy_javascript}};

            const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                width: window.innerWidth,
                height: window.innerHeight,
                layout: {
                    background: { color: '#131722' },
                    textColor: '#d1d4dc'
                },
                grid: {
                    vertLines: { visible: false },
                    horzLines: { visible: false }
                },
                timeScale: {
                    timeVisible: true,
                    secondsVisible: false
                },
                rightPriceScale: {
                    borderVisible: false
                }
            });

            const series = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderUpColor: '#26a69a',
                borderDownColor: '#ef5350',
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350'
            });

            series.setData(candlesData);

            const markers = [];

            if (strategyData && strategyData.length > 0) {
                strategyData.forEach(trade => {
                    if (trade.time !== undefined && trade.time !== null) {
                        markers.push({
                            time: Number(trade.time),
                            position: trade.type === 'short' ? 'aboveBar' : 'belowBar',
                            color: trade.type === 'short' ? '#ff6b6b' : '#51cf66',
                            shape: trade.type === 'short' ? 'arrowDown' : 'arrowUp',
                            text: trade.type === 'short' ? 'SELL' : 'BUY'
                        });
                    }

                    if (trade.exit_time !== undefined && trade.exit_time !== null) {
                        markers.push({
                            time: Number(trade.exit_time),
                            position: trade.type === 'short' ? 'belowBar' : 'aboveBar',
                            color: '#74c0fc',
                            shape: 'square',
                            text: trade.exit_reason || 'EXIT'
                        });
                    }
                });
            }

            markers.sort((a, b) => a.time - b.time);
            if (markers.length > 0) {
                series.setMarkers(markers);
            }

            chart.timeScale().fitContent();

            document.getElementById('log').textContent =
                'OK - ' + candlesData.length + ' bougies chargées';
        } catch (e) {
            console.error(e);
            document.getElementById('log').textContent =
                'Erreur Javascript: ' + e.message;
        }
    </script>
</body>
</html>
