<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FVG Viewer</title>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #131722;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #chart-wrap {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #chart {
            position: absolute;
            inset: 0;
        }

        #overlay {
            position: absolute;
            inset: 0;
            z-index: 8;
            pointer-events: none;
        }

        #log {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 20;
            color: white;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 12px;
            font: 12px Arial, sans-serif;
            border-radius: 6px;
            white-space: pre-line;
            line-height: 1.45;
        }

        #legend {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 20;
            color: white;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 12px;
            font: 12px Arial, sans-serif;
            border-radius: 6px;
            line-height: 1.6;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-box {
            width: 18px;
            height: 10px;
            box-sizing: border-box;
        }

        .bull {
            border: 2px solid rgba(0, 200, 0, 0.70);
            background: rgba(0, 170, 0, 0.08);
        }

        .bear {
            border: 2px solid rgba(255, 80, 80, 0.75);
            background: rgba(220, 0, 0, 0.08);
        }

        .news {
            color: #ffd54f;
        }
    </style>
</head>
<body>
    <div id="chart-wrap">
        <div id="chart"></div>
        <canvas id="overlay"></canvas>
    </div>

    <div id="log">Chargement...</div>

    <div id="legend">
        <div class="legend-row">
            <span class="legend-box bull"></span>
            <span>Bullish FVG</span>
        </div>
        <div class="legend-row">
            <span class="legend-box bear"></span>
            <span>Bearish FVG</span>
        </div>
        <div class="legend-row news">
            <span>[NEWS] = créneau news détecté</span>
        </div>
    </div>

    <script>
        try {
            const candlesData = {{donnees_javascript}};
            const zonesData = {{strategy_javascript}};
            const statsData = {{stats_javascript}};

            const chartContainer = document.getElementById('chart');
            const overlay = document.getElementById('overlay');
            const ctx = overlay.getContext('2d');

            const chart = LightweightCharts.createChart(chartContainer, {
                width: window.innerWidth,
                height: window.innerHeight,
                layout: {
                    background: { color: '#131722' },
                    textColor: '#d1d4dc'
                },
                grid: {
                    vertLines: { visible: false },
                    horzLines: { visible: false }
                },
                timeScale: {
                    timeVisible: true,
                    secondsVisible: false,
                    borderVisible: false
                },
                rightPriceScale: {
                    borderVisible: false
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal
                }
            });

            const series = chart.addCandlestickSeries({
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderUpColor: '#26a69a',
                borderDownColor: '#ef5350',
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350'
            });

            series.setData(candlesData);
            chart.timeScale().fitContent();

            function resizeOverlay() {
                const rect = chartContainer.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                overlay.width = Math.floor(rect.width * dpr);
                overlay.height = Math.floor(rect.height * dpr);
                overlay.style.width = rect.width + 'px';
                overlay.style.height = rect.height + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
            }

            function drawLabel(text, x, y, color) {
                const lines = String(text || '').split('\n');
                const paddingX = 6;
                const paddingY = 4;
                const lineH = 14;
                const width = Math.max(...lines.map(line => ctx.measureText(line).width)) + paddingX * 2;
                const height = (lines.length * lineH) + paddingY * 2;

                ctx.fillStyle = 'rgba(0,0,0,0.72)';
                ctx.fillRect(x, y - height, width, height);

                ctx.fillStyle = color || '#ffffff';
                lines.forEach((line, idx) => {
                    ctx.fillText(line, x + paddingX, y - height + paddingY + 11 + idx * lineH);
                });
            }

            function drawZones() {
                const rect = chartContainer.getBoundingClientRect();
                ctx.clearRect(0, 0, rect.width, rect.height);
                ctx.font = '12px Arial';

                zonesData.forEach(zone => {
                    const x1 = chart.timeScale().timeToCoordinate(zone.start);
                    const x2 = chart.timeScale().timeToCoordinate(zone.end);
                    const yTop = series.priceToCoordinate(zone.max_p);
                    const yBottom = series.priceToCoordinate(zone.min_p);

                    if (
                        x1 === null || x2 === null ||
                        yTop === null || yBottom === null ||
                        Number.isNaN(x1) || Number.isNaN(x2) ||
                        Number.isNaN(yTop) || Number.isNaN(yBottom)
                    ) {
                        return;
                    }

                    const left = Math.min(x1, x2);
                    const right = Math.max(x1, x2);
                    const top = Math.min(yTop, yBottom);
                    const bottom = Math.max(yTop, yBottom);
                    const width = right - left;
                    const height = bottom - top;

                    if (width <= 1 || height <= 1) {
                        return;
                    }

                    ctx.save();
                    ctx.fillStyle = zone.color_bg || 'rgba(255,255,255,0.08)';
                    ctx.strokeStyle = zone.color_border || 'rgba(255,255,255,0.9)';
                    ctx.lineWidth = 2;

                    ctx.fillRect(left, top, width, height);
                    ctx.strokeRect(left, top, width, height);

                    drawLabel(zone.text || zone.title || '', left + 4, top - 4, zone.text_color || '#ffffff');
                    ctx.restore();
                });
            }

            resizeOverlay();
            drawZones();

            chart.timeScale().subscribeVisibleTimeRangeChange(() => drawZones());
            chart.subscribeCrosshairMove(() => drawZones());

            window.addEventListener('resize', () => {
                chart.applyOptions({
                    width: window.innerWidth,
                    height: window.innerHeight
                });
                resizeOverlay();
                drawZones();
            });

            document.getElementById('log').textContent =
                'OK - ' + candlesData.length + ' bougies\\n' +
                'FVG filtrés : ' + statsData.count + '\\n' +
                'Moyenne : ' + statsData.avg.toFixed(2) + ' ' + statsData.unit + '\\n' +
                'Médiane : ' + statsData.median.toFixed(2) + ' ' + statsData.unit;

        } catch (e) {
            console.error(e);
            document.getElementById('log').textContent =
                'Erreur Javascript: ' + e.message;
        }
    </script>
</body>
</html>
