<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Chart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #131722; overflow: hidden; font-family: Arial, sans-serif; }
    #chart { width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 9999;
      color: #d1d4dc; background: rgba(0,0,0,.65);
      padding: 6px 10px; border-radius: 6px; font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="chart"></div>
<div id="hud">Chargement…</div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<script>
// ─────────────────────────────────────────────────────────────
// DONNÉES INJECTÉES PAR main.py
// ─────────────────────────────────────────────────────────────
const CANDLES      = {{candles}};        // [{ time, open, high, low, close }]
const TRADES       = {{trades}};         // [{ time, exit_time, type, exit_reason }]
const PRICE_LINES  = {{price_lines}};    // [{ price, color, label, style? }]
const ZONES        = {{zones}};          // [{ time_start, time_end, price_top, price_bottom, color, label? }]
const IND_EMA      = {{ind_ema}};        // [{ time, value }]
const IND_SMA      = {{ind_sma}};        // [{ time, value }]
const IND_VOLUME   = {{ind_volume}};     // [{ time, value, color? }]
const IND_BASELINE = {{ind_baseline}};   // [{ time, value }]
const IND_CUSTOM   = {{ind_custom}};     // [{ time, value }]  — série libre

// ─────────────────────────────────────────────────────────────
// CRÉATION DU CHART
// ─────────────────────────────────────────────────────────────
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  width:  window.innerWidth,
  height: window.innerHeight,
  layout: {
    background: { color: '#131722' },
    textColor:  '#d1d4dc',
  },
  grid: {
    vertLines: { color: '#1e2230' },
    horzLines: { color: '#1e2230' },
  },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  timeScale: {
    timeVisible:    true,
    secondsVisible: false,
    borderColor:    '#2a2e39',
  },
  rightPriceScale: { borderColor: '#2a2e39' },
});

window.addEventListener('resize', () => {
  chart.applyOptions({ width: window.innerWidth, height: window.innerHeight });
});

// ─────────────────────────────────────────────────────────────
// 1. CANDLESTICKS (toujours présents)
// ─────────────────────────────────────────────────────────────
const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
  upColor:         '#26a69a',
  downColor:       '#ef5350',
  borderUpColor:   '#26a69a',
  borderDownColor: '#ef5350',
  wickUpColor:     '#26a69a',
  wickDownColor:   '#ef5350',
});
candleSeries.setData(CANDLES);

// ─────────────────────────────────────────────────────────────
// 2. MARQUEURS DE TRADES (BUY / SELL / TP / SL)
// ─────────────────────────────────────────────────────────────
if (TRADES.length > 0) {
  const markers = [];

  TRADES.forEach(trade => {
    // Entrée
    if (trade.time != null) {
      markers.push({
        time:     Number(trade.time),
        position: trade.type === 'short' ? 'aboveBar' : 'belowBar',
        color:    trade.type === 'short' ? '#ef5350'  : '#26a69a',
        shape:    trade.type === 'short' ? 'arrowDown': 'arrowUp',
        text:     trade.type === 'short' ? 'SELL'     : 'BUY',
      });
    }
    // Sortie
    if (trade.exit_time != null) {
      const isTP = String(trade.exit_reason || '').toUpperCase() === 'TP';
      markers.push({
        time:     Number(trade.exit_time),
        position: trade.type === 'short' ? 'belowBar' : 'aboveBar',
        color:    isTP ? '#26a69a' : '#ef5350',
        shape:    'square',
        text:     trade.exit_reason || 'EXIT',
      });
    }
  });

  markers.sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(markers);
}

// ─────────────────────────────────────────────────────────────
// 3. LIGNES DE PRIX HORIZONTALES (TP, SL, pivot, niveau custom)
// ─────────────────────────────────────────────────────────────
if (PRICE_LINES.length > 0) {
  PRICE_LINES.forEach(pl => {
    candleSeries.createPriceLine({
      price:            pl.price,
      color:            pl.color  || '#ffffff',
      lineWidth:        pl.width  || 1,
      lineStyle:        pl.style  || LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true,
      title:            pl.label  || '',
    });
  });
}

// ─────────────────────────────────────────────────────────────
// 4. ZONES / RECTANGLES (OB, FVG, range, session)
// Format : { time_start, time_end, price_top, price_bottom, color, label? }
// ─────────────────────────────────────────────────────────────
if (ZONES.length > 0) {
  ZONES.forEach(zone => {
    const color = zone.color || 'rgba(255, 160, 0, 0.15)';

    const zoneSeries = chart.addSeries(LightweightCharts.LineSeries, {
      color:                  'transparent',
      lineWidth:              0,
      lastValueVisible:       false,
      priceLineVisible:       false,
      crosshairMarkerVisible: false,
    });

    zoneSeries.setData([
      { time: Number(zone.time_start), value: zone.price_top },
      { time: Number(zone.time_end),   value: zone.price_top },
    ]);

    // Ligne haute
    zoneSeries.createPriceLine({
      price:            zone.price_top,
      color:            color,
      lineWidth:        1,
      lineStyle:        LightweightCharts.LineStyle.Solid,
      axisLabelVisible: false,
      title:            zone.label || '',
    });

    // Ligne basse
    zoneSeries.createPriceLine({
      price:            zone.price_bottom,
      color:            color,
      lineWidth:        1,
      lineStyle:        LightweightCharts.LineStyle.Solid,
      axisLabelVisible: false,
    });
  });
}

// ─────────────────────────────────────────────────────────────
// 5. EMA
// ─────────────────────────────────────────────────────────────
if (IND_EMA.length > 0) {
  const emaSeries = chart.addSeries(LightweightCharts.LineSeries, {
    color:             '#f5a623',
    lineWidth:         2,
    lastValueVisible:  true,
    priceLineVisible:  false,
    title:             'EMA',
  });
  emaSeries.setData(IND_EMA);
}

// ─────────────────────────────────────────────────────────────
// 6. SMA
// ─────────────────────────────────────────────────────────────
if (IND_SMA.length > 0) {
  const smaSeries = chart.addSeries(LightweightCharts.LineSeries, {
    color:             '#2196f3',
    lineWidth:         2,
    lastValueVisible:  true,
    priceLineVisible:  false,
    title:             'SMA',
  });
  smaSeries.setData(IND_SMA);
}

// ─────────────────────────────────────────────────────────────
// 7. VOLUME (histogramme — panneau séparé via priceScaleId)
// ─────────────────────────────────────────────────────────────
if (IND_VOLUME.length > 0) {
  const volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
    priceFormat:      { type: 'volume' },
    priceScaleId:     'volume',
    color:            '#26a69a',
  });

  chart.priceScale('volume').applyOptions({
    scaleMargins: { top: 0.85, bottom: 0 },
  });

  // Couleur par bougie si fournie, sinon couleur par défaut
  const volumeData = IND_VOLUME.map(v => ({
    time:  v.time,
    value: v.value,
    color: v.color || (v.value >= 0 ? '#26a69a55' : '#ef535055'),
  }));
  volumeSeries.setData(volumeData);
}

// ─────────────────────────────────────────────────────────────
// 8. BASELINE (indicateur centré sur une valeur de référence)
// ex : RSI autour de 50, momentum autour de 0
// ─────────────────────────────────────────────────────────────
if (IND_BASELINE.length > 0) {
  const baselineSeries = chart.addSeries(LightweightCharts.BaselineSeries, {
    baseValue:       { type: 'price', price: 0 },
    topLineColor:    '#26a69a',
    topFillColor1:   'rgba(38, 166, 154, 0.28)',
    topFillColor2:   'rgba(38, 166, 154, 0.05)',
    bottomLineColor: '#ef5350',
    bottomFillColor1:'rgba(239, 83, 80, 0.05)',
    bottomFillColor2:'rgba(239, 83, 80, 0.28)',
    priceScaleId:    'baseline',
    lastValueVisible: true,
    priceLineVisible: false,
    title:            'Baseline',
  });

  chart.priceScale('baseline').applyOptions({
    scaleMargins: { top: 0.75, bottom: 0.05 },
  });

  baselineSeries.setData(IND_BASELINE);
}

// ─────────────────────────────────────────────────────────────
// 9. SÉRIE CUSTOM LIBRE (Line — usage libre)
// ─────────────────────────────────────────────────────────────
if (IND_CUSTOM.length > 0) {
  const customSeries = chart.addSeries(LightweightCharts.LineSeries, {
    color:            '#b39ddb',
    lineWidth:        1,
    lineStyle:        LightweightCharts.LineStyle.Dotted,
    lastValueVisible: true,
    priceLineVisible: false,
    title:            'Custom',
  });
  customSeries.setData(IND_CUSTOM);
}

// ─────────────────────────────────────────────────────────────
// FIT & HUD
// ─────────────────────────────────────────────────────────────
chart.timeScale().fitContent();

document.getElementById('hud').textContent =
  `${CANDLES.length} bougies  |  ${TRADES.length} trades  |  ${ZONES.length} zones` +
  (IND_EMA.length     > 0 ? '  |  EMA'      : '') +
  (IND_SMA.length     > 0 ? '  |  SMA'      : '') +
  (IND_VOLUME.length  > 0 ? '  |  Volume'   : '') +
  (IND_BASELINE.length> 0 ? '  |  Baseline' : '') +
  (IND_CUSTOM.length  > 0 ? '  |  Custom'   : '');
</script>
</body>
</html>
