<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chart</title>
  <script src="https://unpkg.com/lightweight-charts@5.0.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #131722;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #chart { width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 9999;
      color: #d1d4dc; background: rgba(0,0,0,.65);
      padding: 6px 10px; border-radius: 6px;
      font-size: 12px; pointer-events: none;
    }
    #tq-badge {
      position: fixed; bottom: 16px; right: 16px; z-index: 9999;
      background: rgba(0,0,0,.75); border-radius: 6px;
      padding: 8px 14px; font-size: 13px; font-weight: bold;
      pointer-events: none; border-left: 3px solid #9E9E9E;
      color: #9E9E9E;
    }

    #trade-nav {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: rgba(0,0,0,.75);
      border-radius: 6px; padding: 8px 16px;
      font-size: 13px; color: #d1d4dc;
      display: flex; align-items: center; gap: 16px;
      pointer-events: all;
    }
    #trade-nav button {
      background: none; border: 1px solid #2a2e39;
      color: #d1d4dc; border-radius: 4px;
      padding: 4px 10px; cursor: pointer; font-size: 13px;
    }
    #trade-nav button:hover { background: #2a2e39; }    
  </style>
</head>
<body>
  <div id="chart"></div>
  <div id="hud">Chargement…</div>
  <div id="tq-badge" style="display:none"></div>
  <div id="trade-nav" style="display:none">
    <button id="nav-prev">◀ Prev</button>
    <span id="nav-counter">Trade 1 / 1</span>
    <button id="nav-next">Next ▶</button>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // DONNÉES INJECTÉES PAR main.py
    // ─────────────────────────────────────────────────────────────
    const CANDLES      = {{candles}};
    const SESSIONS     = {{sessions}};
    const TRADES       = {{trades}};
    const PRICE_LINES  = {{price_lines}};
    const ZONES        = {{zones}};
    const IND_EMA      = {{ind_ema}};
    const IND_SMA      = {{ind_sma}};
    const IND_VOLUME   = {{ind_volume}};
    const IND_BASELINE = {{ind_baseline}};
    const IND_CUSTOM   = {{ind_custom}};
    const TQ_SCORE     = {{tq_score}};
    const TQ_TEXT      = {{tq_text}};
    const TQ_COLOR     = {{tq_color}};
    const IND_TQ_LABELS= {{ind_tq_labels}};
    const TQ_HISTORY   = {{tq_history}};
    const TRADE_BOXES  = {{trade_boxes}};

    // ─────────────────────────────────────────────────────────────
    // RECHERCHE SCORE PAR TIMESTAMP
    // ─────────────────────────────────────────────────────────────
    function getTQScoreAt(lwcTime) {
      let result = null;
      for (const entry of TQ_HISTORY) {
        if (entry.time <= lwcTime) result = entry;
        else break;
      }
      return result;
    }

    // ─────────────────────────────────────────────────────────────
    // RECTANGLE PRIMITIVE (sessions / zones)
    // ─────────────────────────────────────────────────────────────
    class RectRenderer {
      constructor(x1, y1, x2, y2, opts) {
        this._x1 = x1; this._y1 = y1;
        this._x2 = x2; this._y2 = y2;
        this._opts = opts;
      }
      draw(target) {
        target.useBitmapCoordinateSpace(scope => {
          if (this._x1 === null || this._x2 === null ||
              this._y1 === null || this._y2 === null) return;
          const ctx = scope.context;
          const pr  = scope.horizontalPixelRatio;
          const vr  = scope.verticalPixelRatio;
          const x1  = Math.round(Math.min(this._x1, this._x2) * pr);
          const x2  = Math.round(Math.max(this._x1, this._x2) * pr);
          const y1  = Math.round(Math.min(this._y1, this._y2) * vr);
          const y2  = Math.round(Math.max(this._y1, this._y2) * vr);
          ctx.fillStyle = this._opts.fillColor;
          ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
          if (this._opts.borderColor) {
            ctx.strokeStyle = this._opts.borderColor;
            ctx.lineWidth = pr;
            ctx.strokeRect(x1 + 0.5, y1 + 0.5, x2 - x1 - 1, y2 - y1 - 1);
          }
        });
      }
    }

    class RectView {
      constructor(source) { this._src = source; }
      update() {
        const s  = this._src;
        const ts = s._chart.timeScale();
        s._cx1 = ts.timeToCoordinate(s._t1);
        s._cx2 = ts.timeToCoordinate(s._t2);
        s._cy1 = s._series.priceToCoordinate(s._p1);
        s._cy2 = s._series.priceToCoordinate(s._p2);
      }
      renderer() {
        return new RectRenderer(
          this._src._cx1, this._src._cy1,
          this._src._cx2, this._src._cy2,
          this._src._opts
        );
      }
    }

    class RectPrimitive {
      constructor(chart, series, t1, p1, t2, p2, opts) {
        this._chart  = chart;  this._series = series;
        this._t1 = t1; this._p1 = p1;
        this._t2 = t2; this._p2 = p2;
        this._opts = opts;
        this._cx1 = null; this._cy1 = null;
        this._cx2 = null; this._cy2 = null;
        this._views = [new RectView(this)];
      }
      updateAllViews() { this._views.forEach(v => v.update()); }
      paneViews()      { return this._views; }
    }

    // ─────────────────────────────────────────────────────────────
    // TRADE BOX PRIMITIVE (zone de trade locale)
    // ─────────────────────────────────────────────────────────────
    class TradeBoxRenderer {
      constructor(xEntry, xRight, yEntry, ySl, yTpFinal, isLong, maxRR, yRRLevels, colors) {
        this._xEntry   = xEntry;
        this._xRight   = xRight;
        this._yEntry   = yEntry;
        this._ySl      = ySl;
        this._yTpFinal = yTpFinal;
        this._isLong   = isLong;
        this._maxRR    = maxRR;
        this._yRRLevels = yRRLevels;
        this._colors   = colors;
      }
      draw(target) {
        target.useBitmapCoordinateSpace(scope => {
          if (this._xEntry === null || this._xRight === null) return;
          if (this._yEntry === null || this._ySl === null || this._yTpFinal === null) return;

          const ctx = scope.context;
          const pr  = scope.horizontalPixelRatio;
          const vr  = scope.verticalPixelRatio;

          const x1 = Math.round(this._xEntry  * pr);
          const x2 = Math.round(this._xRight  * pr);

          const yEntry   = Math.round(this._yEntry   * vr);
          const ySl      = Math.round(this._ySl      * vr);
          const yTpFinal = Math.round(this._yTpFinal * vr);

          // TP box (entrée → TP final)
          ctx.fillStyle = this._colors.tp_fill || 'rgba(0,150,136,0.3)';
          ctx.fillRect(x1, Math.min(yEntry, yTpFinal), x2 - x1, Math.abs(yTpFinal - yEntry));

          // SL box (entrée → SL)
          ctx.fillStyle = this._colors.sl_fill || 'rgba(239,83,80,0.3)';
          ctx.fillRect(x1, Math.min(yEntry, ySl), x2 - x1, Math.abs(ySl - yEntry));

          // Ligne d'entrée
          ctx.strokeStyle = this._colors.entry_line || '#ffffff';
          ctx.lineWidth   = pr * 2;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(x1, yEntry);
          ctx.lineTo(x2, yEntry);
          ctx.stroke();

          // Lignes RR pointillées
          ctx.strokeStyle = this._colors.rr_line || 'rgba(255,255,255,0.25)';
          ctx.lineWidth   = pr;
          ctx.setLineDash([4 * pr, 4 * pr]);
          for (const yLvl of this._yRRLevels) {
            if (yLvl === null) continue;
            const y = Math.round(yLvl * vr);
            ctx.beginPath();
            ctx.moveTo(x1, y);
            ctx.lineTo(x2, y);
            ctx.stroke();
          }
          ctx.setLineDash([]);
        });
      }
    }

    class TradeBoxView {
      constructor(source) { this._src = source; }
      update() {
        const s  = this._src;
        const ts = s._chart.timeScale();

        s._xEntry = ts.timeToCoordinate(s._timeEntry);
        s._xRight = ts.timeToCoordinate(s._timeRight);

        const slDist  = Math.abs(s._entry - s._sl);
        const finalTp = s._isLong
          ? s._entry + slDist * s._maxRR
          : s._entry - slDist * s._maxRR;

        s._yEntry   = s._series.priceToCoordinate(s._entry);
        s._ySl      = s._series.priceToCoordinate(s._sl);
        s._yTpFinal = s._series.priceToCoordinate(finalTp);

        s._yRRLevels = [];
        for (let i = 1; i <= s._maxRR; i++) {
          const lvl = s._isLong
            ? s._entry + slDist * i
            : s._entry - slDist * i;
          s._yRRLevels.push(s._series.priceToCoordinate(lvl));
        }
      }
      renderer() {
        const s = this._src;
        return new TradeBoxRenderer(
          s._xEntry, s._xRight,
          s._yEntry, s._ySl, s._yTpFinal,
          s._isLong, s._maxRR, s._yRRLevels,
          s._colors
        );
      }
    }

    class TradeBoxPrimitive {
      constructor(chart, series, timeEntry, timeRight, entry, sl, isLong, maxRR, colors = {}) {
        this._chart     = chart;
        this._series    = series;
        this._timeEntry = timeEntry;
        this._timeRight = timeRight;
        this._entry     = entry;
        this._sl        = sl;
        this._isLong    = isLong;
        this._maxRR     = maxRR;
        this._colors    = colors;
        this._xEntry    = null;
        this._xRight    = null;
        this._yEntry    = null;
        this._ySl       = null;
        this._yTpFinal  = null;
        this._yRRLevels = [];
        this._views     = [new TradeBoxView(this)];
      }
      updateAllViews() { this._views.forEach(v => v.update()); }
      paneViews()      { return this._views; }
    }

    // ─────────────────────────────────────────────────────────────
    // CHART
    // ─────────────────────────────────────────────────────────────
    const chart = LightweightCharts.createChart(
      document.getElementById('chart'), {
        width:  window.innerWidth,
        height: window.innerHeight,
        layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
        grid:   { vertLines: { color: '#1e2230' }, horzLines: { color: '#1e2230' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { timeVisible: true, secondsVisible: false, borderColor: '#2a2e39' },
        rightPriceScale: { borderColor: '#2a2e39' },
    });

    window.addEventListener('resize', () =>
      chart.applyOptions({ width: window.innerWidth, height: window.innerHeight })
    );

    // ─────────────────────────────────────────────────────────────
    // 1. CANDLESTICKS
    // ─────────────────────────────────────────────────────────────
    const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor:        '#26a69a', downColor:        '#ef5350',
      borderUpColor:  '#26a69a', borderDownColor:  '#ef5350',
      wickUpColor:    '#26a69a', wickDownColor:    '#ef5350',
    });
    candleSeries.setData(CANDLES);

    // ─────────────────────────────────────────────────────────────
    // 2. SESSIONS
    // ─────────────────────────────────────────────────────────────
    if (SESSIONS.length > 0) {
      SESSIONS.forEach(ses => {
        candleSeries.attachPrimitive(new RectPrimitive(
          chart, candleSeries,
          Number(ses.time_start), ses.price_top,
          Number(ses.time_end),   ses.price_bottom,
          { fillColor: ses.color, borderColor: ses.border_color }
        ));
      });
    }

    // ─────────────────────────────────────────────────────────────
    // 3. MARQUEURS DE TRADES (API OFFICIELLE)
    // ─────────────────────────────────────────────────────────────
    if (TRADES.length > 0 && LightweightCharts.createSeriesMarkers) {
      const markers = TRADES.map(t => ({
        time:     Number(t.time),
        position: t.position || 'aboveBar',
        color:    t.color    || '#ffffff',
        shape:    t.shape    || 'circle',
        text:     t.text     || '',
      }));
      LightweightCharts.createSeriesMarkers(candleSeries, markers);
    }

    // ─────────────────────────────────────────────────────────────
    // 4. PRICE_LINES (non affichées pour l'instant)
    // ─────────────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────────────
    // 5. ZONES (OB, FVG...)
    // ─────────────────────────────────────────────────────────────
    if (ZONES.length > 0) {
      ZONES.forEach(zone => {
        candleSeries.attachPrimitive(new RectPrimitive(
          chart, candleSeries,
          Number(zone.time_start), zone.price_top,
          Number(zone.time_end),   zone.price_bottom,
          {
            fillColor:   zone.color        || 'rgba(255,160,0,0.15)',
            borderColor: zone.border_color || 'rgba(255,160,0,0.6)',
          }
        ));
      });
    }

    // ─────────────────────────────────────────────────────────────
    // 6. TRADE BOXES (optionnel)
    // ─────────────────────────────────────────────────────────────
    if (typeof TRADE_BOXES !== 'undefined' && TRADE_BOXES.length > 0) {
      TRADE_BOXES.forEach(tb => {
        candleSeries.attachPrimitive(new TradeBoxPrimitive(
          chart, candleSeries,
          Number(tb.time_entry),
          Number(tb.time_right),
          tb.entry,
          tb.sl,
          !!tb.is_long,
          tb.max_rr || 3,
          tb.colors || {}
        ));
      });
    }

    // ─────────────────────────────────────────────────────────────
    // FIT & HUD
    // ─────────────────────────────────────────────────────────────
    chart.timeScale().fitContent();
    const hud = document.getElementById('hud');

    if (CANDLES.length > 0) {
      const first = CANDLES[0];
      const last  = CANDLES[CANDLES.length - 1];
      const firstDate = new Date(first.time * 1000);
      const lastDate  = new Date(last.time  * 1000);
      const pad = (n) => String(n).padStart(2, '0');
      const fmtDate = (d) =>
        `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

      const symbol    = {{symbol}};
      const timeframe = {{timeframe}};

      const line1 = `${symbol} ${timeframe}  |  ${fmtDate(firstDate)} → ${fmtDate(lastDate)}`;
      const line2 =
        `${CANDLES.length} bougies`
        + (SESSIONS.length > 0 ? `  |  ${SESSIONS.length} sessions` : "")
        + (TRADES.length   > 0 ? `  |  ${TRADES.length} trades`     : "");

      hud.innerHTML = `${line1}<br>${line2}`;
    } else {
      hud.textContent = "Aucune donnée";
    }

    // ─────────────────────────────────────────────────────────────
    // TREND QUALITY BADGE + SURVOL DYNAMIQUE
    // ─────────────────────────────────────────────────────────────
    const badge = document.getElementById('tq-badge');

    function showBadge(score, color) {
      badge.style.display     = 'block';
      badge.style.color       = color;
      badge.style.borderColor = color;
      badge.textContent       = `Trend Quality : ${score}%`;
    }

    if (TQ_SCORE !== null && TQ_SCORE !== undefined && !Number.isNaN(Number(TQ_SCORE))) {
      showBadge(TQ_SCORE, TQ_COLOR);
    }

    chart.subscribeCrosshairMove(param => {
      if (!param || !param.time) {
        if (TQ_SCORE !== null && !Number.isNaN(Number(TQ_SCORE))) {
          showBadge(TQ_SCORE, TQ_COLOR);
        }
        return;
      }
      const entry = getTQScoreAt(param.time);
      if (entry) showBadge(entry.score, entry.color);
    });

    // ─────────────────────────────────────────────────────────────
    // NAVIGATION TRADES
    // ─────────────────────────────────────────────────────────────
    if (typeof TRADE_BOXES !== 'undefined' && TRADE_BOXES.length > 0) {
      const nav     = document.getElementById('trade-nav');
      const counter = document.getElementById('nav-counter');
      nav.style.display = 'flex';

      let currentIdx = 0;
      const total = TRADE_BOXES.length;
      const MARGIN = 10; // bougies de marge de chaque côté

      function goToTrade(idx) {
        currentIdx = (idx + total) % total;
        const tb = TRADE_BOXES[currentIdx];

        const entryIdx = CANDLES.findIndex(c => c.time >= tb.time_entry);
        if (entryIdx === -1) {
          counter.textContent = `Trade ${currentIdx + 1} / ${total}`;
          return;
        }

        // Récupérer le range visible actuel → calculer sa largeur en barres
        const visibleRange = chart.timeScale().getVisibleLogicalRange();
        const visibleBars  = visibleRange
          ? Math.round(visibleRange.to - visibleRange.from)
          : 60;

        // Centrer entryIdx au milieu de la fenêtre visible
        const halfBars = Math.round(visibleBars / 2);
        const center   = entryIdx - halfBars;

        chart.timeScale().setVisibleLogicalRange({
          from: center,
          to:   center + visibleBars,
        });

        counter.textContent = `Trade ${currentIdx + 1} / ${total}`;
      }
      document.getElementById('nav-prev').addEventListener('click', () => goToTrade(currentIdx - 1));
      document.getElementById('nav-next').addEventListener('click', () => goToTrade(currentIdx + 1));

      // Raccourcis clavier ← →
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft')  goToTrade(currentIdx - 1);
        if (e.key === 'ArrowRight') goToTrade(currentIdx + 1);
      });

      goToTrade(0); // centrer sur le premier trade au chargement
    }        

  </script>
</body>
</html>
