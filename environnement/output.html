      markers.push({
        time:     Number(trade.exit_time),
        position: trade.type === 'short' ? 'belowBar' : 'aboveBar',
        color:    isTP ? '#26a69a' : '#ef5350',
        shape:    'square',
        text:     trade.exit_reason || 'EXIT',
      });
    }
  });

  markers.sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(markers);
}

// ─────────────────────────────────────────────────────────────
// 3. LIGNES DE PRIX HORIZONTALES (TP, SL, pivot, niveau custom)
// ─────────────────────────────────────────────────────────────
if (PRICE_LINES.length > 0) {
  PRICE_LINES.forEach(pl => {
    candleSeries.createPriceLine({
      price:            pl.price,
      color:            pl.color  || '#ffffff',
      lineWidth:        pl.width  || 1,
      lineStyle:        pl.style  || LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true,
      title:            pl.label  || '',
    });
  });
}

// ─────────────────────────────────────────────────────────────
// 4. ZONES / RECTANGLES (OB, FVG, range, session)
// Format : { time_start, time_end, price_top, price_bottom, color, label? }
// ─────────────────────────────────────────────────────────────
if (ZONES.length > 0) {
  ZONES.forEach(zone => {
    const color = zone.color || 'rgba(255, 160, 0, 0.15)';

    const zoneSeries = chart.addSeries(LightweightCharts.LineSeries, {
      color:                  'transparent',
      lineWidth:              0,
      lastValueVisible:       false,
      priceLineVisible:       false,
      crosshairMarkerVisible: false,
    });

    zoneSeries.setData([
      { time: Number(zone.time_start), value: zone.price_top },
      { time: Number(zone.time_end),   value: zone.price_top },
    ]);

    // Ligne haute
    zoneSeries.createPriceLine({
      price:            zone.price_top,
      color:            color,
      lineWidth:        1,
      lineStyle:        LightweightCharts.LineStyle.Solid,
      axisLabelVisible: false,
      title:            zone.label || '',
    });

    // Ligne basse
    zoneSeries.createPriceLine({
      price:            zone.price_bottom,
      color:            color,
      lineWidth:        1,
      lineStyle:        LightweightCharts.LineStyle.Solid,
      axisLabelVisible: false,
    });
  });
}

// ─────────────────────────────────────────────────────────────
// 5. EMA
// ─────────────────────────────────────────────────────────────
if (IND_EMA.length > 0) {
  const emaSeries = chart.addSeries(LightweightCharts.LineSeries, {
    color:             '#f5a623',
    lineWidth:         2,
    lastValueVisible:  true,
    priceLineVisible:  false,
    title:             'EMA',
  });
  emaSeries.setData(IND_EMA);
}

// ─────────────────────────────────────────────────────────────
// 6. SMA
// ─────────────────────────────────────────────────────────────
if (IND_SMA.length > 0) {
  const smaSeries = chart.addSeries(LightweightCharts.LineSeries, {
    color:             '#2196f3',
    lineWidth:         2,
    lastValueVisible:  true,
    priceLineVisible:  false,
    title:             'SMA',
  });
  smaSeries.setData(IND_SMA);
}

// ─────────────────────────────────────────────────────────────
// 7. VOLUME (histogramme — panneau séparé via priceScaleId)
// ─────────────────────────────────────────────────────────────
if (IND_VOLUME.length > 0) {
  const volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
    priceFormat:      { type: 'volume' },
    priceScaleId:     'volume',
    color:            '#26a69a',
  });

  chart.priceScale('volume').applyOptions({
    scaleMargins: { top: 0.85, bottom: 0 },
  });

  // Couleur par bougie si fournie, sinon couleur par défaut
  const volumeData = IND_VOLUME.map(v => ({
    time:  v.time,
    value: v.value,
    color: v.color || (v.value >= 0 ? '#26a69a55' : '#ef535055'),
  }));
  volumeSeries.setData(volumeData);
}

// ─────────────────────────────────────────────────────────────
// 8. BASELINE (indicateur centré sur une valeur de référence)
// ex : RSI autour de 50, momentum autour de 0
// ─────────────────────────────────────────────────────────────
if (IND_BASELINE.length > 0) {
  const baselineSeries = chart.addSeries(LightweightCharts.BaselineSeries, {
    baseValue:       { type: 'price', price: 0 },
    topLineColor:    '#26a69a',
    topFillColor1:   'rgba(38, 166, 154, 0.28)',
    topFillColor2:   'rgba(38, 166, 154, 0.05)',
    bottomLineColor: '#ef5350',
    bottomFillColor1:'rgba(239, 83, 80, 0.05)',
    bottomFillColor2:'rgba(239, 83, 80, 0.28)',
    priceScaleId:    'baseline',
    lastValueVisible: true,
    priceLineVisible: false,
    title:            'Baseline',
  });

  chart.priceScale('baseline').applyOptions({
    scaleMargins: { top: 0.75, bottom: 0.05 },
  });

  baselineSeries.setData(IND_BASELINE);
}

// ─────────────────────────────────────────────────────────────
// 9. SÉRIE CUSTOM LIBRE (Line — usage libre)
// ─────────────────────────────────────────────────────────────
if (IND_CUSTOM.length > 0) {
  const customSeries = chart.addSeries(LightweightCharts.LineSeries, {
    color:            '#b39ddb',
    lineWidth:        1,
    lineStyle:        LightweightCharts.LineStyle.Dotted,
    lastValueVisible: true,
    priceLineVisible: false,
    title:            'Custom',
  });
  customSeries.setData(IND_CUSTOM);
}

// ─────────────────────────────────────────────────────────────
// FIT & HUD
// ─────────────────────────────────────────────────────────────
chart.timeScale().fitContent();

document.getElementById('hud').textContent =
  `${CANDLES.length} bougies  |  ${TRADES.length} trades  |  ${ZONES.length} zones` +
  (IND_EMA.length     > 0 ? '  |  EMA'      : '') +
  (IND_SMA.length     > 0 ? '  |  SMA'      : '') +
  (IND_VOLUME.length  > 0 ? '  |  Volume'   : '') +
  (IND_BASELINE.length> 0 ? '  |  Baseline' : '') +
  (IND_CUSTOM.length  > 0 ? '  |  Custom'   : '');
</script>
</body>
</html>
